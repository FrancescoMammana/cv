experiences:
  title: Experiences
  info:
  - role: C# .NET Developer
    time: 02/2024 - Presente
    company: Datev Koinos Italia, Milano
    details: |
      Sviluppo di moduli cloud per la gestione immobili, locazioni e fiscalità (IMU/dichiarazioni).
        - Architettura ASP.NET con Wisej .NET, Ninject e Dapper.
        - Gestione dati con SQL Server e caching tramite Redis.
        - Sviluppo orientato agli eventi e programmazione asincrona.
  - role: Developer .NET (C#, VB.NET)
    time: 07/2022 - 02/2024
    company: MTA Spa, Codogno
    details: |
      Sviluppo software interno per il settore automotive (Risorse umane, Qualità, Costi).
        - Utilizzo di WPF e Code Trigger.
        - Integrazione e comunicazione con SAP (modulo MM).
        - Gestione database SQL Server.
  - role: Developer .NET (C#)
    time: 02/2006 - 07/2022
    company: Wins SRL, Milano
    details: |
      Sviluppo ERP WinStore per il Retail (Euronics, Mediaworld, Trony).
        - Gestione barriera cassa, hardware fiscale, magazzino e servizi REST/JSON.
  - role: Developer .NET (C#)
    time: 09/2005 - 02/2006
    company: Università degli Studi di Milano - Alamobility
    details: |
      Tesi su gestione trasporti a chiamata e ottimizzazione flotte in real-time.
