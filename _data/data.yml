career-profile:
  title: Career Profile
  summary: |
    Sviluppatore .NET con una carriera decennale focalizzata sulla creazione di sistemi gestionali ed ERP complessi. 
    Attualmente impegnato presso Datev Koinos Italia nello sviluppo di soluzioni cloud per la gestione immobiliare e fiscale, impiegando architetture ASP.NET, Wisej, Ninject e Dapper. 
    Vanto una consolidata esperienza nel settore Retail (progetto WinStore per Euronics, Mediaworld, Expert e Trony) e nell'integrazione di sistemi aziendali (SAP MM) e hardware fiscale. 
    Esperto sviluppatore con stack C#, SQL Server, ho lavorato con varie tecnologie in ambiente Microsoft:  WiseJ .NET, WPF, .NET MAUI, e in altri linguaggi collegati come VB .NET. 
    Lavoro giornalmente usando programmazione asincrona, Dependency Injection e gestendo database relazionali.

